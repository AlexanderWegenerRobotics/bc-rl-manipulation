simulation:
  scene_path: "models/mujoco/scene.xml"
  steps_per_action: 5
  q0: [-0.3, -1.1, 0.3, -2.0, 0.5, 2.9, -0.9]

robot:
  urdf_path: "models/urdf/franka_fr3/fr3_franka_hand.urdf"
  ee_frame_name: "fr3_hand_tcp"
  base_quat_wxyz: [0.5, 0.5, 0.5, 0.5]
  gripper:
    ctrl_index: 7
  finger_joints:
    index_left: 7
    index_right: 8

grasp_detection:
  contact_bodies: ["left_finger", "right_finger"]
  object_body: "box"
  width_min: 0.01
  width_max: 0.07

control:
  K_cart: [1000, 1000, 1000, 80, 80, 80]
  D_cart: [70, 70, 70, 10, 10, 10]
  K_null: 10
  tau_max: [87, 87, 87, 87, 12, 12, 12]
  q_nominal: [-0.3, -1.1, 0.3, -2.0, 0.5, 2.9, -0.9]
  gravity_compensation: true

rendering:
  enabled: true
  window_name: "bc-rl-manipulation"
  camera:
    width: 1280
    height: 960
    fps: 30
    lookat: [0.4, 0.0, 0.5]
    azimuth: 140
    elevation: -25
    distance: 1.8